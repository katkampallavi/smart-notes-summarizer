<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Notes</title>


<link rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}">


</head>

<body>

<div class="auth-container">


<h1>📝 Create Account</h1>

<p class="subtitle">
    Join Smart Notes and start generating AI-powered summaries
</p>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="👤 Enter Username"
        required>

    <input
        type="email"
        name="email"
        placeholder="📧 Enter Email"
        required>

    <input
        type="password"
        name="password"
        placeholder="🔒 Create Password"
        required>

    <button type="submit">
        Create Account
    </button>

</form>

<p>
    Already have an account?
    <a href="/login">Login</a>
</p>


</div>

</body>

</html>
